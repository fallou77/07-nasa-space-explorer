<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="container">
    <header class="site-header">
      <img src="img/nasa-worm-logo.png" alt="NASA logo" class="logo" />
      <div>
        <p class="eyebrow">Astronomy Picture of the Day</p>
        <h1>Space Explorer</h1>
      </div>
    </header>

    <section class="space-fact" aria-labelledby="factTitle">
      <h2 id="factTitle">Did You Know?</h2>
      <p id="spaceFact">Loading a space fact...</p>
    </section>

    <section class="filters" aria-label="Choose an APOD date range">
      <label>
        Start date
        <input type="date" id="startDate" />
      </label>

      <label>
        End date
        <input type="date" id="endDate" />
      </label>

      <button id="getImagesButton" type="button">Get Space Images</button>
    </section>

    <main id="gallery" class="gallery" aria-live="polite">
      <div class="placeholder">
        <div class="placeholder-icon">🔭</div>
        <p>Select a date range and click “Get Space Images” to explore the cosmos!</p>
      </div>
    </main>
  </div>

  <div id="imageModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" hidden>
    <div class="modal-overlay" data-close-modal></div>
    <div class="modal-content">
      <button class="modal-close" type="button" aria-label="Close modal" data-close-modal>&times;</button>
      <div id="modalMedia" class="modal-media"></div>
      <div class="modal-details">
        <h2 id="modalTitle"></h2>
        <p id="modalDate" class="modal-date"></p>
        <p id="modalExplanation"></p>
      </div>
    </div>
  </div>

  <script src="js/dateRange.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
